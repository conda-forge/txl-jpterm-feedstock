{% set python_min = "3.10" %}
{% set name = "txl-jpterm" %}
{% set version = "0.3.8" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/txl_jpterm-{{ version }}.tar.gz
  sha256: 5b2a8a5fd1008ef314d6d8ec773d47d6282fa826f41312b21e893e9c657573d5

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . --no-deps --ignore-installed --no-cache-dir -vvv

requirements:
  host:
    - python {{ python_min }}
    - pip
    - hatchling
  run:
    - python >={{ python_min }}
    - txl =0.3.2

test:
  requires:
    - pip
    - python {{ python_min }}
  commands:
    - pip check
  imports:
    - txl_jpterm

about:
  home: https://github.com/davidbrochart/jpterm/blob/main/plugins/jpterm
  summary: TXL plugin for the jpterm app
  dev_url: https://github.com/davidbrochart/jpterm/blob/main/plugins/jpterm
  license_file: LICENSE.txt
  license: MIT
  license_family: MIT

extra:
  recipe-maintainers:
    - davidbrochart
