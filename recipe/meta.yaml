{% set python_min = "3.10" %}
{% set name = "txl-jpterm" %}
{% set version = "0.3.3" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/txl_jpterm-{{ version }}.tar.gz
  sha256: f449ca76849677e33d2fc4a484a205a266e70e5383bd1d93e3efe24755b5c47e

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . --no-deps --ignore-installed --no-cache-dir -vvv

requirements:
  host:
    - python {{ python_min }}
    - pip
    - hatchling
  run:
    - python >={{ python_min }}
    - txl >=0.2.18,<0.3.0

test:
  # `pip check` was disabled, see: https://github.com/conda-forge/staged-recipes/pull/26869
  #
  # requires:
  #   - pip
  # commands:
  #   - pip check
  requires:
    - python {{ python_min }}
  imports:
    - txl_jpterm

about:
  home: https://github.com/davidbrochart/jpterm/blob/main/plugins/jpterm
  summary: TXL plugin for the jpterm app
  dev_url: https://github.com/davidbrochart/jpterm/blob/main/plugins/jpterm
  license_file: LICENSE.txt
  license: MIT
  license_family: MIT

extra:
  recipe-maintainers:
    - davidbrochart
